<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mensagem enviada</title>
    <style>
      :root {
        color-scheme: dark;
      }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: #0f172a;
        color: #e2e8f0;
        font-family: Inter, Segoe UI, Roboto, Arial, sans-serif;
      }
      main {
        width: min(92vw, 560px);
        background: rgba(15, 23, 42, 0.9);
        border: 1px solid rgba(148, 163, 184, 0.25);
        border-radius: 14px;
        padding: 28px;
        text-align: center;
      }
      h1 {
        margin: 0 0 10px;
        font-size: 1.9rem;
      }
      p {
        margin: 0 0 18px;
        color: #cbd5e1;
      }
      a {
        display: inline-block;
        padding: 10px 16px;
        border-radius: 10px;
        text-decoration: none;
        color: #0f172a;
        background: #22d3ee;
        font-weight: 700;
      }
      a:hover {
        filter: brightness(1.05);
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Mensagem enviada com sucesso</h1>
      <p>Obrigado pelo contato. Vou responder assim que possivel.</p>
      <a href="/">Voltar ao curriculo</a>
    </main>
  </body>
</html>
